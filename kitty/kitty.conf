# Tokyo Night Color Scheme
background #000000
foreground #a9b1d6
cursor     #a9b1d6

# Normal colors
color0  #32344a
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  #ad8ee6
color6  #449dab
color7  #787c99

# Bright colors
color8  #444b6a
color9  #ff7a93
color10 #b9f27c
color11 #ff9e64
color12 #7da6ff
color13 #bb9af7
color14 #0db9d7
color15 #acb0d0

# Font Configuration
font_family JetbrainsMono Nerd Font
font_size 20

# Opacity
background_opacity 0.80

# URL launcher (Kitty supports URL detection natively, but you can customize it)
open_url_modifiers ctrl
open_url_with open %s
